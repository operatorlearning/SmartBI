version: '3.8'

services:
  smartbi-mysql:
    image: mysql:8.0
    container_name: smartbi-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_bi
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  smartbi-redis:
    image: redis:7.2-alpine
    container_name: smartbi-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  smartbi-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartbi-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  mysql-data:
  redis-data:
