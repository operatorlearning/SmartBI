server:
  port: 8089
  servlet:
    context-path: /api

spring:
  application:
    name: smart-bi

  # ==================== 数据源 ====================
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_bi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1

  # ==================== Redis ====================
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ==================== RabbitMQ ====================
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 3000ms

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # ==================== Jackson ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ==================== MyBatis-Plus ====================
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.smartbi.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== JWT ====================
jwt:
  secret: SmartBI2024SecretKeyForJwtTokenGenerationMustBeLongEnough256Bits!!
  expiration: 86400000   # 24小时 (ms)

# ==================== AI 配置 ====================
smartbi:
  ai:
    # 支持 OpenAI 兼容 API（DeepSeek / ChatGLM / GPT）
    api-url: https://api.deepseek.com/v1/chat/completions
    api-key: ${AI_API_KEY:sk-demo-key}
    model: deepseek-chat
    timeout: 60000
    # 未配置有效 API Key 时启用 Mock 模式
    mock-enabled: true

# ==================== 线程池 ====================
thread-pool:
  core-size: 4
  max-size: 8
  queue-capacity: 100
  keep-alive: 60
  name-prefix: ai-task-

# ==================== 限流 ====================
rate-limit:
  # 每用户每分钟AI调用上限
  ai-calls-per-minute: 5

# ==================== Knife4j ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.smartbi.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 日志 ====================
logging:
  level:
    com.smartbi: debug
    org.springframework.security: info
